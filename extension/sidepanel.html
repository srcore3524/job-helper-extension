<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Helper AI</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-left">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
        <path d="M16 7V5a4 4 0 0 0-8 0v2"/>
      </svg>
      <span class="header-title">Job Helper AI</span>
    </div>
    <button id="logoutBtn" class="icon-btn" title="Logout">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </button>
  </header>

  <!-- ===== APPLICANT SELECTOR ===== -->
  <div class="applicant-bar">
    <label for="applicantSelect">Applicant</label>
    <select id="applicantSelect">
      <option value="">Loading...</option>
    </select>
  </div>

  <!-- ===== TABS ===== -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="job">Job</button>
    <button class="tab-btn" data-tab="upwork">Upwork</button>
  </div>

  <!-- ===== JOB TAB ===== -->
  <div class="tab-content active" id="tab-job">
    <!-- Placeholder when no data -->
    <div id="jobPlaceholder" class="placeholder-section">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4a4a6a" stroke-width="1.5">
        <rect x="2" y="7" width="20" height="14" rx="2"/>
        <path d="M16 7V5a4 4 0 0 0-8 0v2"/>
      </svg>
      <p>Navigate to a LinkedIn or Indeed job page and click the floating button to analyze.</p>
    </div>

    <!-- Job results (hidden until analysis) -->
    <div id="jobResults" style="display:none;">
      <!-- Job title & company -->
      <div class="job-header-card">
        <h2 id="jobTitle" class="job-title">-</h2>
        <p id="jobCompany" class="job-company">-</p>
      </div>

      <!-- Apply status -->
      <div class="status-bar">
        <button class="status-btn active" data-status="not_applied">Not Applied</button>
        <button class="status-btn" data-status="applied">Applied</button>
        <button class="status-btn" data-status="interview">Interview</button>
        <button class="status-btn" data-status="rejected">Rejected</button>
        <button class="status-btn" data-status="offer">Offer</button>
      </div>

      <!-- Quick info cards -->
      <div class="info-cards-row">
        <div class="info-card">
          <span class="info-icon">&#127758;</span>
          <span id="jobLocation" class="info-value">-</span>
        </div>
        <div class="info-card" id="remoteCard">
          <span class="info-icon">&#128187;</span>
          <span id="jobRemote" class="info-value">-</span>
        </div>
        <div class="info-card">
          <span class="info-icon">&#128293;</span>
          <span id="jobHiring" class="info-value">-</span>
        </div>
      </div>

      <!-- Match score -->
      <div class="section-card">
        <div class="section-label">Match Score</div>
        <div class="progress-bar-container">
          <div id="matchBar" class="progress-bar" style="width:0%;">
            <span id="matchPercent" class="progress-text">0%</span>
          </div>
        </div>
      </div>

      <!-- Summary -->
      <div class="section-card">
        <div class="section-label">Summary</div>
        <p id="jobSummary" class="summary-text">-</p>
      </div>

      <!-- Skills -->
      <div class="section-card">
        <div class="section-label">Skills</div>
        <div id="skillsGrid" class="skills-grid"></div>
      </div>

      <!-- External links -->
      <div class="section-card" id="linksSection" style="display:none;">
        <div class="section-label">External Links</div>
        <div id="externalLinks" class="links-list"></div>
      </div>

      <!-- Q&A -->
      <div class="section-card">
        <div class="section-label">Q&A Assistant</div>
        <textarea id="jobQuestionInput" class="textarea" placeholder="Paste interview questions here..." rows="3"></textarea>
        <button id="jobGenerateBtn" class="btn-primary btn-sm">Generate Answer</button>
        <div id="jobAnswerArea" class="answer-area" style="display:none;">
          <div id="jobAnswerText" class="answer-text"></div>
          <button id="jobCopyBtn" class="btn-copy" title="Copy to clipboard">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== UPWORK TAB ===== -->
  <div class="tab-content" id="tab-upwork">
    <!-- Paste section -->
    <div class="section-card">
      <div class="section-label">Job Description</div>
      <textarea id="upworkInput" class="textarea" placeholder="Paste Upwork job description here..." rows="6"></textarea>
      <button id="upworkAnalyzeBtn" class="btn-primary">Analyze</button>
    </div>

    <!-- Upwork results (hidden until analysis) -->
    <div id="upworkResults" style="display:none;">
      <!-- Quick info cards -->
      <div class="info-cards-row">
        <div class="info-card">
          <span class="info-icon">&#127758;</span>
          <span id="upworkLocation" class="info-value">-</span>
        </div>
        <div class="info-card" id="upworkRemoteCard">
          <span class="info-icon">&#128187;</span>
          <span id="upworkRemote" class="info-value">-</span>
        </div>
        <div class="info-card">
          <span class="info-icon">&#128293;</span>
          <span id="upworkHiring" class="info-value">-</span>
        </div>
      </div>

      <!-- Match score -->
      <div class="section-card">
        <div class="section-label">Match Score</div>
        <div class="progress-bar-container">
          <div id="upworkMatchBar" class="progress-bar" style="width:0%;">
            <span id="upworkMatchPercent" class="progress-text">0%</span>
          </div>
        </div>
      </div>

      <!-- Summary -->
      <div class="section-card">
        <div class="section-label">Summary</div>
        <p id="upworkSummary" class="summary-text">-</p>
      </div>

      <!-- Skills -->
      <div class="section-card">
        <div class="section-label">Skills</div>
        <div id="upworkSkillsGrid" class="skills-grid"></div>
      </div>

      <!-- Bid draft -->
      <div class="section-card">
        <div class="section-label">Bid Draft</div>
        <div id="upworkBidArea" class="answer-area">
          <div id="upworkBidText" class="answer-text">-</div>
          <button id="upworkBidCopy" class="btn-copy" title="Copy to clipboard">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
        </div>
      </div>

      <!-- Q&A -->
      <div class="section-card">
        <div class="section-label">Q&A Assistant</div>
        <textarea id="upworkQuestionInput" class="textarea" placeholder="Paste interview questions here..." rows="3"></textarea>
        <button id="upworkGenerateBtn" class="btn-primary btn-sm">Generate Answer</button>
        <div id="upworkAnswerArea" class="answer-area" style="display:none;">
          <div id="upworkAnswerText" class="answer-text"></div>
          <button id="upworkCopyBtn" class="btn-copy" title="Copy to clipboard">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== LOADING OVERLAY ===== -->
  <div id="loadingOverlay" class="loading-overlay" style="display:none;">
    <div class="loading-content">
      <div class="spinner"></div>
      <p id="loadingText">Analyzing job description...</p>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
