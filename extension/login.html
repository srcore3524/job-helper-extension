<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Helper AI - Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="12" fill="#0f3460"/>
        <text x="24" y="32" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold" font-family="system-ui">JH</text>
      </svg>
    </div>
    <h1 class="login-title">Job Helper AI</h1>
    <p class="login-subtitle">Sign in to continue</p>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
      </div>

      <div id="errorMsg" class="error-msg" style="display:none;"></div>

      <button type="submit" id="loginBtn" class="btn-login">
        <span class="btn-text">Sign In</span>
        <span class="btn-loader" style="display:none;">
          <span class="spinner-sm"></span> Signing in...
        </span>
      </button>
    </form>

    <div class="login-footer">
      <a href="#" id="settingsLink">API Settings</a>
    </div>

    <!-- API settings modal -->
    <div id="settingsModal" class="modal-overlay" style="display:none;">
      <div class="modal-card">
        <h3>API Settings</h3>
        <div class="form-group">
          <label for="apiUrl">API Base URL</label>
          <input type="url" id="apiUrl" placeholder="http://localhost:3000">
        </div>
        <div class="modal-actions">
          <button id="saveSettings" class="btn-login">Save</button>
          <button id="cancelSettings" class="btn-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
