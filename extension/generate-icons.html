<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate Icons for Job Helper AI</title>
  <style>
    body { font-family: system-ui; background: #1a1a2e; color: #e0e0e0; padding: 40px; text-align: center; }
    canvas { margin: 10px; border: 1px solid #333; }
    .row { margin: 20px 0; }
    a { color: #e94560; }
    button { padding: 10px 20px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; margin: 5px; }
    p { margin: 10px 0; color: #8a8a9a; }
  </style>
</head>
<body>
  <h1>Job Helper AI - Icon Generator</h1>
  <p>Click the buttons below to download each icon as PNG, then place them in the <code>icons/</code> folder.</p>

  <div class="row">
    <h3>16x16</h3>
    <canvas id="c16" width="16" height="16"></canvas>
    <br><button onclick="download('c16', 'icon16.png')">Download 16px</button>
  </div>

  <div class="row">
    <h3>48x48</h3>
    <canvas id="c48" width="48" height="48"></canvas>
    <br><button onclick="download('c48', 'icon48.png')">Download 48px</button>
  </div>

  <div class="row">
    <h3>128x128</h3>
    <canvas id="c128" width="128" height="128"></canvas>
    <br><button onclick="download('c128', 'icon128.png')">Download 128px</button>
  </div>

  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const r = size * 0.2; // corner radius

      // Background rounded rect
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();

      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, '#0f3460');
      grad.addColorStop(1, '#1a1a2e');
      ctx.fillStyle = grad;
      ctx.fill();

      // "JH" text
      ctx.fillStyle = '#e94560';
      ctx.font = `bold ${size * 0.45}px system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('JH', size / 2, size / 2 + size * 0.02);
    }

    drawIcon('c16', 16);
    drawIcon('c48', 48);
    drawIcon('c128', 128);

    function download(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
